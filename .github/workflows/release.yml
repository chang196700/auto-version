name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for version calculation

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress binary with UPX
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}"
          # UPX does not support aarch64 Linux ELF well; skip for that target
          if [[ "${{ matrix.target }}" != "aarch64-unknown-linux-gnu" ]]; then
            upx --best --lzma "$BINARY" || echo "UPX compression failed (non-fatal), continuing..."
          fi

      - name: Determine binary name
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "name=auto-version.exe" >> $GITHUB_OUTPUT
          else
            echo "name=auto-version" >> $GITHUB_OUTPUT
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/${{ steps.binary.outputs.name }}"
          ARCHIVE="auto-version-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ steps.binary.outputs.name }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target\${{ matrix.target }}\release\${{ steps.binary.outputs.name }}"
          $archive = "auto-version-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-version-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install auto-version (for dogfooding)
        run: |
          # Use the freshly built Linux binary to generate release notes version info
          chmod +x artifacts/auto-version || true
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "auto-version ${{ github.ref_name }}"
          body: |
            ## auto-version ${{ github.ref_name }}

            ### Download

            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | Linux    | x86_64      | `auto-version-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux    | aarch64     | `auto-version-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS    | x86_64      | `auto-version-x86_64-apple-darwin.tar.gz` |
            | macOS    | Apple Silicon | `auto-version-aarch64-apple-darwin.tar.gz` |
            | Windows  | x86_64      | `auto-version-x86_64-pc-windows-msvc.zip` |

            ### Install via cargo
            ```sh
            cargo install auto-version
            ```

            ### Install via shell (Linux/macOS)
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-$(uname -m)-$(uname -s | tr '[:upper:]' '[:lower:]')-gnu.tar.gz | tar -xz
            sudo mv auto-version /usr/local/bin/
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
