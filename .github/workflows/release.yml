name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }} [${{ matrix.variant }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (4 variants) ──────────────────────────────────────
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              variant: full,        cargo_flags: "" }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              variant: full-upx,    cargo_flags: "",                                      use_upx: true }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              variant: minimal,     cargo_flags: "--no-default-features --features cli" }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              variant: minimal-upx, cargo_flags: "--no-default-features --features cli",  use_upx: true }

          # ── Linux aarch64 cross-compiled (no UPX support) ─────────────────
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              cross: true, variant: full,    cargo_flags: "" }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, archive: tar.gz,
              cross: true, variant: minimal, cargo_flags: "--no-default-features --features cli" }

          # ── macOS x86_64 (no UPX support) ─────────────────────────────────
          - { target: x86_64-apple-darwin, os: macos-latest, archive: tar.gz,
              variant: full,    cargo_flags: "" }
          - { target: x86_64-apple-darwin, os: macos-latest, archive: tar.gz,
              variant: minimal, cargo_flags: "--no-default-features --features cli" }

          # ── macOS aarch64 / Apple Silicon (no UPX support) ────────────────
          - { target: aarch64-apple-darwin, os: macos-latest, archive: tar.gz,
              variant: full,    cargo_flags: "" }
          - { target: aarch64-apple-darwin, os: macos-latest, archive: tar.gz,
              variant: minimal, cargo_flags: "--no-default-features --features cli" }

          # ── Windows x86_64 (4 variants) ────────────────────────────────────
          - { target: x86_64-pc-windows-msvc, os: windows-latest, archive: zip,
              variant: full,        cargo_flags: "" }
          - { target: x86_64-pc-windows-msvc, os: windows-latest, archive: zip,
              variant: full-upx,    cargo_flags: "",                                      use_upx: true }
          - { target: x86_64-pc-windows-msvc, os: windows-latest, archive: zip,
              variant: minimal,     cargo_flags: "--no-default-features --features cli" }
          - { target: x86_64-pc-windows-msvc, os: windows-latest, archive: zip,
              variant: minimal-upx, cargo_flags: "--no-default-features --features cli",  use_upx: true }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for version calculation

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Determine binary name
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "name=auto-version.exe" >> $GITHUB_OUTPUT
            echo "path=target\\${{ matrix.target }}\\release\\auto-version.exe" >> $GITHUB_OUTPUT
          else
            echo "name=auto-version" >> $GITHUB_OUTPUT
            echo "path=target/${{ matrix.target }}/release/auto-version" >> $GITHUB_OUTPUT
          fi

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}

      - name: Run auto-version on itself (dogfooding)
        # Only run for non-cross, non-upx variants (upx variants share the same binary)
        if: matrix.cross != true && !contains(matrix.variant, 'upx')
        shell: bash
        run: |
          echo "=== auto-version version ==="
          "${{ steps.binary.outputs.path }}" version
          echo ""
          echo "=== auto-version show ==="
          "${{ steps.binary.outputs.path }}" show -f kv

      - name: Install UPX
        if: matrix.use_upx == true
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress binary with UPX
        if: matrix.use_upx == true
        shell: bash
        run: |
          upx --best --lzma "${{ steps.binary.outputs.path }}" \
            || echo "UPX compression failed (non-fatal), continuing..."

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="auto-version-${{ matrix.target }}-${{ matrix.variant }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ steps.binary.outputs.name }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "auto-version-${{ matrix.target }}-${{ matrix.variant }}.zip"
          Compress-Archive -Path "${{ steps.binary.outputs.path }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-version-${{ matrix.target }}-${{ matrix.variant }}
          path: ${{ env.ARCHIVE }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Linux binary for dogfooding
        run: |
          tar -xzf artifacts/auto-version-x86_64-unknown-linux-gnu-full.tar.gz
          chmod +x auto-version

      - name: Generate version info with auto-version
        id: avinfo
        run: |
          # Let the tool report its own version for the release
          echo "=== auto-version version (release) ==="
          ./auto-version version
          echo ""

          # Capture fields for the release body
          VERSION=$(./auto-version show)
          VERSION_FULL=$(./auto-version show -f full)
          VERSION_INFO=$(./auto-version show -f info)
          SHA=$(./auto-version show -f kv | grep '^GIT_SHORT_SHA=' | cut -d= -f2)
          DATE=$(./auto-version show -f kv | grep '^BUILD_DATE=' | cut -d= -f2)

          echo "version=$VERSION"         >> $GITHUB_OUTPUT
          echo "version_full=$VERSION_FULL" >> $GITHUB_OUTPUT
          echo "version_info=$VERSION_INFO" >> $GITHUB_OUTPUT
          echo "sha=$SHA"                 >> $GITHUB_OUTPUT
          echo "date=$DATE"               >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "auto-version ${{ steps.avinfo.outputs.version }}"
          body: |
            ## auto-version ${{ steps.avinfo.outputs.version }}

            > Generated by auto-version itself 🔄
            >
            > `${{ steps.avinfo.outputs.version_info }}`
            > commit `${{ steps.avinfo.outputs.sha }}` · ${{ steps.avinfo.outputs.date }}

            ### Variants

            | Variant | Features | UPX |
            |---------|----------|-----|
            | `full` | yaml-config, template, unicode | ✗ |
            | `full-upx` | yaml-config, template, unicode | ✓ (Linux x86_64 & Windows only) |
            | `minimal` | CLI only | ✗ |
            | `minimal-upx` | CLI only | ✓ (Linux x86_64 & Windows only) |

            ### Download

            | Platform | Architecture | full | full-upx | minimal | minimal-upx |
            |----------|-------------|------|----------|---------|-------------|
            | Linux    | x86_64      | [.tar.gz][lx-f] | [.tar.gz][lx-fu] | [.tar.gz][lx-m] | [.tar.gz][lx-mu] |
            | Linux    | aarch64     | [.tar.gz][la-f] | — | [.tar.gz][la-m] | — |
            | macOS    | x86_64      | [.tar.gz][mx-f] | — | [.tar.gz][mx-m] | — |
            | macOS    | Apple Silicon | [.tar.gz][ma-f] | — | [.tar.gz][ma-m] | — |
            | Windows  | x86_64      | [.zip][wx-f]  | [.zip][wx-fu]  | [.zip][wx-m]  | [.zip][wx-mu]  |

            [lx-f]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-unknown-linux-gnu-full.tar.gz
            [lx-fu]: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-unknown-linux-gnu-full-upx.tar.gz
            [lx-m]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-unknown-linux-gnu-minimal.tar.gz
            [lx-mu]: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-unknown-linux-gnu-minimal-upx.tar.gz
            [la-f]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-aarch64-unknown-linux-gnu-full.tar.gz
            [la-m]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-aarch64-unknown-linux-gnu-minimal.tar.gz
            [mx-f]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-apple-darwin-full.tar.gz
            [mx-m]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-apple-darwin-minimal.tar.gz
            [ma-f]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-aarch64-apple-darwin-full.tar.gz
            [ma-m]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-aarch64-apple-darwin-minimal.tar.gz
            [wx-f]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-pc-windows-msvc-full.zip
            [wx-fu]: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-pc-windows-msvc-full-upx.zip
            [wx-m]:  ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-pc-windows-msvc-minimal.zip
            [wx-mu]: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-x86_64-pc-windows-msvc-minimal-upx.zip

            ### Install via cargo
            ```sh
            cargo install auto-version
            ```

            ### Install via shell (Linux/macOS)
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-$(uname -m)-unknown-linux-gnu-full.tar.gz | tar -xz
            sudo mv auto-version /usr/local/bin/
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
