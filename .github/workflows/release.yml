name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.3)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for version calculation

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        if: matrix.cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Determine binary name
        id: binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "name=auto-version.exe" >> $GITHUB_OUTPUT
            echo "path=target\\${{ matrix.target }}\\release\\auto-version.exe" >> $GITHUB_OUTPUT
          else
            echo "name=auto-version" >> $GITHUB_OUTPUT
            echo "path=target/${{ matrix.target }}/release/auto-version" >> $GITHUB_OUTPUT
          fi

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Run auto-version on itself (dogfooding)
        if: matrix.cross != true
        shell: bash
        run: |
          echo "=== auto-version version ==="
          "${{ steps.binary.outputs.path }}" version
          echo ""
          echo "=== auto-version show ==="
          "${{ steps.binary.outputs.path }}" show -f kv

      - name: Install UPX
        if: runner.os != 'macOS'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress binary with UPX
        if: runner.os != 'macOS'
        shell: bash
        run: |
          BINARY="${{ steps.binary.outputs.path }}"
          # UPX does not support aarch64 Linux ELF well; skip for that target
          if [[ "${{ matrix.target }}" != "aarch64-unknown-linux-gnu" ]]; then
            upx --best --lzma "$BINARY" || echo "UPX compression failed (non-fatal), continuing..."
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="auto-version-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "${{ steps.binary.outputs.name }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "auto-version-${{ matrix.target }}.zip"
          Compress-Archive -Path "${{ steps.binary.outputs.path }}" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-version-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Linux binary for dogfooding
        run: |
          tar -xzf artifacts/auto-version-x86_64-unknown-linux-gnu.tar.gz
          chmod +x auto-version

      - name: Generate version info with auto-version
        id: avinfo
        run: |
          # Let the tool report its own version for the release
          echo "=== auto-version version (release) ==="
          ./auto-version version
          echo ""

          # Capture fields for the release body
          VERSION=$(./auto-version show)
          VERSION_FULL=$(./auto-version show -f full)
          VERSION_INFO=$(./auto-version show -f info)
          SHA=$(./auto-version show -f kv | grep '^GIT_SHORT_SHA=' | cut -d= -f2)
          DATE=$(./auto-version show -f kv | grep '^BUILD_DATE=' | cut -d= -f2)

          echo "version=$VERSION"         >> $GITHUB_OUTPUT
          echo "version_full=$VERSION_FULL" >> $GITHUB_OUTPUT
          echo "version_info=$VERSION_INFO" >> $GITHUB_OUTPUT
          echo "sha=$SHA"                 >> $GITHUB_OUTPUT
          echo "date=$DATE"               >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "auto-version ${{ steps.avinfo.outputs.version }}"
          body: |
            ## auto-version ${{ steps.avinfo.outputs.version }}

            > Generated by auto-version itself 🔄
            >
            > `${{ steps.avinfo.outputs.version_info }}`
            > commit `${{ steps.avinfo.outputs.sha }}` · ${{ steps.avinfo.outputs.date }}

            ### Download

            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | Linux    | x86_64      | `auto-version-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux    | aarch64     | `auto-version-aarch64-unknown-linux-gnu.tar.gz` |
            | macOS    | x86_64      | `auto-version-x86_64-apple-darwin.tar.gz` |
            | macOS    | Apple Silicon | `auto-version-aarch64-apple-darwin.tar.gz` |
            | Windows  | x86_64      | `auto-version-x86_64-pc-windows-msvc.zip` |

            ### Install via cargo
            ```sh
            cargo install auto-version
            ```

            ### Install via shell (Linux/macOS)
            ```sh
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/auto-version-$(uname -m)-unknown-linux-gnu.tar.gz | tar -xz
            sudo mv auto-version /usr/local/bin/
            ```
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
